<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>キャッシュを更新</title>
    <style>
      body {
        margin: 0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #e9edf4;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 14px;
        width: min(100% - 32px, 420px);
        padding: 22px;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 34px rgba(23, 32, 51, 0.12);
      }

      h1,
      p {
        margin: 0;
      }

      a {
        display: inline-grid;
        min-height: 44px;
        place-items: center;
        border-radius: 8px;
        color: #fff;
        background: #314a78;
        font-weight: 850;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>キャッシュを更新しました</h1>
      <p>古い画面データを削除しました。下のボタンから開き直してください。</p>
      <a href="./index.html?v=53">アプリを開く</a>
    </main>
    <script>
      (async () => {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      })();
    </script>
  </body>
</html>
